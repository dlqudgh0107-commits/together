<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Together | 함께하는 일정 공유</title>
  <meta name="description" content="가족과 팀의 일정을 함께 관리하세요">
  <link rel="icon" type="image/png" href="resource/images/favicon.png">
  <link rel="stylesheet" href="resource/css/reset.css">
  <link rel="stylesheet" href="resource/css/font.css">
  <link rel="stylesheet" href="resource/css/pc.css">
  <link rel="stylesheet" href="resource/css/mobile.css">
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="screen-login" class="screen screen--active">
    <div class="login-container">
      <div class="login-card">
        <h1 class="login-title">Together</h1>
        <p class="login-subtitle">가족과 팀의 일정을 함께 관리하세요</p>
        <button type="button" class="btn btn--primary btn--lg" id="login-btn">Google 로그인</button>
      </div>
    </div>
  </div>

  <!-- 그룹 선택/생성 화면 -->
  <div id="screen-group" class="screen">
    <div class="group-container">
      <h1 class="group-title">어떤 그룹을 선택하시겠어요?</h1>
      <div class="group-list" id="group-list"></div>
      <div class="group-actions">
        <button type="button" class="btn btn--secondary btn--md" id="create-group-btn">+ 새 그룹 만들기</button>
        <button type="button" class="btn btn--ghost btn--md" id="join-group-btn">🔗 초대코드로 참여</button>
      </div>
    </div>
  </div>

  <!-- 메인 앱 화면 -->
  <div id="screen-app" class="screen">
    <!-- 헤더 -->
    <header class="app-header">
      <button type="button" class="header-menu-btn" id="menu-left-btn" aria-label="메뉴">
        <span>≡</span>
      </button>
      <div class="header-title" id="header-group-name">Together</div>
      <div class="header-right">
        <button type="button" class="header-icon-btn" id="notification-btn" aria-label="알림">
          <span class="bell-icon">🔔</span>
          <span class="notification-badge" id="notification-badge"></span>
        </button>
        <button type="button" class="header-menu-btn" id="menu-right-btn" aria-label="옵션">
          <span>⋮</span>
        </button>
      </div>
    </header>

    <!-- 좌측 메뉴 (사이드바) -->
    <div class="sidebar" id="sidebar-left">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div class="sidebar-content">
        <div class="sidebar-header">
          <h2 class="sidebar-title">메뉴</h2>
          <button type="button" class="sidebar-close" id="sidebar-close-btn">×</button>
        </div>

        <div class="sidebar-section">
          <div class="user-profile">
            <div class="user-avatar">👤</div>
            <div class="user-info">
              <div class="user-name" id="sidebar-user-name">사용자</div>
              <div class="user-email" id="sidebar-user-email">user@gmail.com</div>
            </div>
          </div>
          <button type="button" class="btn btn--sm btn--ghost" id="profile-edit-btn">프로필 편집</button>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section-title">내 그룹</h3>
          <div class="group-select-list" id="group-select-list"></div>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section-title">기타</h3>
          <button type="button" class="sidebar-item" id="settings-btn">⚙️ 설정</button>
          <button type="button" class="sidebar-item" id="logout-btn">🚪 로그아웃</button>
        </div>
      </div>
    </div>

    <!-- 우측 메뉴 (드롭다운) -->
    <div class="dropdown-menu" id="dropdown-menu-right">
      <button type="button" class="dropdown-item" id="group-settings-btn">⚙️ 그룹 설정</button>
      <button type="button" class="dropdown-item" id="invite-btn">👥 멤버 초대</button>
      <button type="button" class="dropdown-item" id="leave-group-btn">🚪 그룹 나가기</button>
    </div>

    <!-- 탭 네비게이션 -->
    <nav class="app-tabs">
      <button type="button" class="app-tabs__tab app-tabs__tab--active" data-tab="home">🏠 홈</button>
      <button type="button" class="app-tabs__tab" data-tab="schedule">📅 일정</button>
      <button type="button" class="app-tabs__tab" data-tab="todo">✓ 할일</button>
    </nav>

    <!-- 탭 콘텐츠 -->
    <main class="app-main">
      <!-- 홈 탭 -->
      <div class="app-tab-content app-tab-content--active" data-tab-content="home">
        <div class="home-content">
          <!-- AI 요약 -->
          <section class="card-section">
            <h2 class="section-title">📊 AI 요약</h2>
            <div class="summary-card" id="summary-card">
              <div class="spinner"></div>
              <p>요약을 불러오는 중...</p>
            </div>
          </section>

          <!-- 오늘의 일정/할일 -->
          <section class="card-section">
            <h2 class="section-title">오늘의 일정 & 할일</h2>
            <div class="today-section" id="today-section">
              <div class="empty-state">
                <p>오늘의 일정과 할일이 없습니다</p>
              </div>
            </div>
          </section>

          <!-- 구성원 활동 피드 -->
          <section class="card-section">
            <h2 class="section-title">최근 추가된 항목</h2>
            <div class="activity-feed" id="activity-feed">
              <div class="empty-state">
                <p>아직 활동이 없습니다</p>
              </div>
            </div>
          </section>

          <!-- 가족 멤버 -->
          <section class="card-section">
            <h2 class="section-title">👥 가족 멤버</h2>
            <div class="member-bar" id="member-bar"></div>
          </section>
        </div>
      </div>

      <!-- 일정 탭 -->
      <div class="app-tab-content" data-tab-content="schedule">
        <div class="schedule-content">
          <div class="schedule-header">
            <h2 class="section-title">일정</h2>
          </div>
          <div class="schedule-list" id="schedule-list"></div>
        </div>
      </div>

      <!-- 할일 탭 -->
      <div class="app-tab-content" data-tab-content="todo">
        <div class="todo-content">
          <div class="todo-header">
            <h2 class="section-title">할일</h2>
            <div class="filter-tabs">
              <button type="button" class="filter-tab filter-tab--active" data-filter="all">모두</button>
              <button type="button" class="filter-tab" data-filter="pending">진행중</button>
              <button type="button" class="filter-tab" data-filter="completed">완료</button>
            </div>
          </div>
          <div class="todo-list" id="todo-list"></div>
        </div>
      </div>
    </main>

    <!-- FAB 버튼 -->
    <button type="button" class="fab-button" id="fab-button" aria-label="추가">
      <span class="fab-icon">+</span>
    </button>

    <!-- FAB 메뉴 -->
    <div class="fab-menu" id="fab-menu">
      <button type="button" class="fab-menu-item" id="fab-schedule" data-action="schedule">
        <span class="fab-menu-icon">📅</span>
        <span>일정 추가</span>
      </button>
      <button type="button" class="fab-menu-item" id="fab-todo" data-action="todo">
        <span class="fab-menu-icon">✓</span>
        <span>할일 추가</span>
      </button>
    </div>

    <!-- 알림 모달 -->
    <div class="modal" id="modal-notifications">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">알림</h2>
          <button type="button" class="modal-close" data-modal-close>×</button>
        </div>
        <div class="notification-list" id="notification-list"></div>
      </div>
    </div>
  </div>

  <!-- 일정 추가/편집 모달 -->
  <div class="modal" id="modal-schedule-form">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="schedule-form-title">일정 추가</h2>
        <button type="button" class="modal-close" data-modal-close>×</button>
      </div>
      <form class="form" id="schedule-form">
        <div class="form-group">
          <label for="schedule-title" class="form-label">제목</label>
          <input type="text" id="schedule-title" class="form-input" placeholder="일정 제목" required>
        </div>
        <div class="form-group">
          <label for="schedule-start-date" class="form-label">시작 날짜</label>
          <input type="date" id="schedule-start-date" class="form-input" required>
        </div>
        <div class="form-group">
          <label for="schedule-end-date" class="form-label">종료 날짜</label>
          <input type="date" id="schedule-end-date" class="form-input" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="schedule-start-time" class="form-label">시작 시간</label>
            <input type="time" id="schedule-start-time" class="form-input">
          </div>
          <div class="form-group">
            <label for="schedule-end-time" class="form-label">종료 시간</label>
            <input type="time" id="schedule-end-time" class="form-input">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn--secondary" data-modal-close>취소</button>
          <button type="submit" class="btn btn--primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 할일 추가/편집 모달 -->
  <div class="modal" id="modal-todo-form">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="todo-form-title">할일 추가</h2>
        <button type="button" class="modal-close" data-modal-close>×</button>
      </div>
      <form class="form" id="todo-form">
        <div class="form-group">
          <label for="todo-title" class="form-label">할일</label>
          <input type="text" id="todo-title" class="form-input" placeholder="할일 내용" required>
        </div>
        <div class="form-group">
          <label for="todo-start-date" class="form-label">시작 날짜</label>
          <input type="date" id="todo-start-date" class="form-input">
        </div>
        <div class="form-group">
          <label for="todo-due-date" class="form-label">마감 날짜</label>
          <input type="date" id="todo-due-date" class="form-input" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="todo-start-time" class="form-label">시작 시간</label>
            <input type="time" id="todo-start-time" class="form-input">
          </div>
          <div class="form-group">
            <label for="todo-end-time" class="form-label">마감 시간</label>
            <input type="time" id="todo-end-time" class="form-input">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn--secondary" data-modal-close>취소</button>
          <button type="submit" class="btn btn--primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 스크립트 로드 -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-compat.js"></script>
  <script src="resource/js/firebase.js"></script>
  <script src="resource/js/ai.js"></script>
  <script src="resource/js/app.js"></script>
</body>
</html>
